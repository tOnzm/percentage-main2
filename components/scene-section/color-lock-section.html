<section class="workspace-section">
  <div class="section-content">
    <div class="color-lock-toggle-row">
      <div class="toggle-switch active" id="color-lock-toggle" role="button" tabindex="0">
        <span class="toggle-switch-knob"></span>
        <span>Apply Color Lock</span>
      </div>
      <input type="text" class="color-lock-hex-input" id="color-lock-hex" value="#4A90E2" maxlength="7" placeholder="#HEX" />
    </div>
    <div class="color-lock-swatch-grid" id="color-lock-swatches"></div>
    <div class="color-lock-preview" id="color-lock-preview"></div>
  </div>
</section>
