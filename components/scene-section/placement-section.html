<section class="workspace-section">
    <div class="section-content">
        <button type="button" class="action-btn" id="open-placement-modal" style="width: 100%;">
            <span class="material-symbols-outlined">add</span> เลือกการจัดวาง
        </button>
        <div class="product-detail" id="placement-detail" aria-live="polite">
            ยังไม่เลือกการจัดวาง
        </div>
    </div>

    <!-- Modal Structure -->
    <div id="placement-modal" class="pm-modal" role="dialog" aria-modal="true" aria-labelledby="placement-modal-title">
        <div class="pm-modal-overlay" id="placement-modal-overlay"></div>
        <div class="pm-modal-container">
            <div class="pm-modal-header">
                <div class="header-brand">
                    <h3 class="workspace-title" id="placement-modal-title" style="font-size: 20px;">จัดการการจัดวาง</h3>
                </div>
                <button type="button" class="theme-toggle-btn" id="close-placement-modal"
                    style="border:none; background:none;">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>

            <div class="pm-modal-body--with-sidebar">
                <aside class="pm-modal-sidebar" id="placement-sidebar-nav">
                    <button type="button" class="modal-nav-btn active" data-target="placement-list-pane">
                        <span class="material-symbols-outlined">grid_view</span> จากรายการ
                    </button>
                    <button type="button" class="modal-nav-btn" data-target="placement-custom-pane">
                        <span class="material-symbols-outlined">edit</span> กำหนดเอง
                    </button>
                </aside>
                <div class="pm-modal-main" id="placement-modal-main">
                    <div class="modal-section" id="placement-list-pane">
                        <div class="pm-label">เลือกจากรายการ</div>
                        <div class="product-search-wrapper" style="margin-bottom:var(--sp-3);">
                            <span class="material-symbols-outlined">search</span>
                            <input type="text" class="product-search-input" id="placement-search" placeholder="ค้นหาการจัดวาง..." autocomplete="off" />
                        </div>
                        <div class="scene-grid" id="placement-group" role="group" aria-label="เลือกการจัดวาง"></div>
                    </div>
                    <div class="modal-section" id="placement-custom-pane" style="display:none;">
                        <div class="pm-label">พิมพ์การจัดวางเอง</div>
                        <textarea class="pm-textarea" id="placement-custom-textarea" placeholder="เช่น วางผลิตภัณฑ์ตรงกลางกรอบ โดยให้ขวดหันไปทางซ้าย มีพื้นที่ว่างด้านบน..." style="min-height:120px;"></textarea>
                        <div class="snotes mt-3">ข้อความนี้จะถูกใช้แทนรายการที่เลือก</div>
                    </div>
                </div>
            </div>
            <div class="pm-modal-footer" style="gap: 8px;">
                <button type="button" class="clear-btn" id="clear-placement-selection">ล้างค่า</button>
                <button type="button" class="main-btn" id="confirm-placement-selection">ปิด</button>
            </div>
        </div>
    </div>
</section>
