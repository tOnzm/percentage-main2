<section class="workspace-section">
    <div class="section-title">
        <span class="material-symbols-outlined">light_mode_auto</span> Lighting & Mood
    </div>

    <div class="section-content">
        <button type="button" class="action-btn" id="open-lighting-modal" style="width: 100%;">
            <i class="ti ti-plus"></i> เลือกการจัดแสงและอารมณ์ภาพ
        </button>

        <div id="lighting-display" class="chip-group mt-3">
            <!-- Selected choices as chips -->
        </div>

        <!-- Modal Structure -->
        <div id="lighting-modal" class="pm-modal" role="dialog" aria-modal="true"
            aria-labelledby="lighting-modal-title">
            <div class="pm-modal-overlay" id="lighting-modal-overlay"></div>
            <div class="pm-modal-container">
                <div class="pm-modal-header">
                    <div class="header-brand">
                        <h3 class="workspace-title" id="lighting-modal-title" style="font-size: 20px;">
                            จัดการแสงและอารมณ์ภาพ</h3>
                    </div>
                    <button type="button" class="theme-toggle-btn" id="close-lighting-modal"
                        style="border:none; background:none;">
                        <i class="ti ti-x"></i>
                    </button>
                </div>

                <div class="pm-modal-body pm-modal-body--with-sidebar">
                    <aside class="pm-modal-sidebar">
                        <div class="sidebar-toggle-container"
                            style="display: flex; justify-content: flex-end; margin-bottom: 12px;">
                            <button type="button" id="lighting-sidebar-toggle" class="theme-toggle-btn"
                                style="width: 28px; height: 28px; font-size: 12px;">
                                <i class="ti ti-chevron-left"></i>
                            </button>
                        </div>
                        <div class="modal-sidebar-nav"
                            style="display: flex; flex-direction: column; gap: 8px; width: 100%;">
                            <button type="button" class="modal-nav-btn active" data-target="lighting-section-pane">
                                <i class="ti ti-brightness"></i> <span>Lighting</span>
                            </button>
                            <button type="button" class="modal-nav-btn" data-target="mood-section-pane">
                                <i class="ti ti-palette"></i> <span>Mood & Tone</span>
                            </button>
                        </div>
                    </aside>

                    <div class="pm-modal-main">
                        <div id="lighting-section-pane" class="modal-section">
                            <div class="pm-label">เลือกการจัดแสง (Lighting)</div>
                            <div id="lighting-filter-container" class="pill-group mb-4"></div>
                            <div id="light-group" role="group"></div>
                        </div>

                        <div id="mood-section-pane" class="modal-section" style="display: none;">
                            <div class="pm-label">เลือกอารมณ์ภาพ (Mood)</div>
                            <div id="mood-filter-container" class="pill-group mb-4"></div>
                            <div id="mood-group" role="group"></div>
                            <div class="mt-4">
                                <div class="pm-label">หรือระบุเอง</div>
                                <input class="pm-input" id="mood-custom" placeholder="เช่น moody, cinematic, vibrant..."
                                    autocomplete="off" />
                            </div>
                        </div>
                    </div>
                </div>

                <div class="pm-modal-footer" style="gap: 8px;">
                    <button type="button" class="clear-btn" id="clear-lighting-selection">ล้างค่า</button>
                    <button type="button" class="main-btn" id="confirm-lighting-selection">ตกลง</button>
                </div>
            </div>
        </div>

        <div>
            <div class="pm-label">Extra Details</div>
            <textarea class="pm-textarea" id="extra" rows="2"
                placeholder="เช่น award-winning photography, volumetric smoke effects..."></textarea>
        </div>
    </div>
</section>
