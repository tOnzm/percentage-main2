<section class="workspace-section">
  <div class="section-title">
    <i class="ti ti-camera" aria-hidden="true"></i> Camera & Lighting
  </div>

  <div class="section-content">
    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px;">
      <div>
        <div class="pm-label">Angle</div>
        <div class="pill-group" id="angle-group" role="group" aria-label="เลือกมุมกล้อง"></div>
      </div>

      <div>
        <div class="pm-label">Lens</div>
        <div class="pill-group" id="lens-group" role="group" aria-label="เลือกลักษณะเลนส์"></div>
      </div>

      <div>
        <div class="pm-label">Lighting</div>
        <div class="pill-group" id="light-group" role="group" aria-label="เลือกการจัดแสง"></div>
      </div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px;">
      <div>
        <div class="pm-label">Ratio</div>
        <div class="pill-group" id="ratio-group" role="group">
          <button type="button" class="pill active" data-val="9:16">9:16</button>
          <button type="button" class="pill" data-val="1:1">1:1</button>
          <button type="button" class="pill" data-val="16:9">16:9</button>
          <button type="button" class="pill" data-val="4:5">4:5</button>
        </div>
      </div>

      <div>
        <div class="pm-label">Quality</div>
        <div class="pill-group" id="quality-group" role="group" aria-label="เลือกระดับคุณภาพ"></div>
      </div>

      <div>
        <div class="pm-label">Finish</div>
        <div class="pill-group" id="finish-group" role="group" aria-label="เลือกผิวฉลาก"></div>
      </div>
    </div>

    <div>
      <div class="pm-label">Mood</div>
      <div class="pill-group" id="mood-group" role="group" aria-label="เลือกอารมณ์ภาพ"></div>
      <input class="pm-input mt-3" id="mood-custom" placeholder="หรือระบุเอง" autocomplete="off" />
    </div>

    <div>
      <div class="pm-label">Extra Details</div>
      <textarea class="pm-textarea" id="extra" rows="2"
        placeholder="เช่น award-winning photography, volumetric smoke effects..."></textarea>
    </div>
  </div>
</section>
