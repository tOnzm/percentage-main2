<section class="workspace-section">
  <div class="section-content">
    <button type="button" class="action-btn" id="open-product-modal">
      <span class="material-symbols-outlined">add</span> เลือกสินค้า
    </button>
    <div class="product-detail" id="product-detail" aria-live="polite">
      ยังไม่เลือกสินค้าใดๆ
    </div>

    <!-- Display mode -->
    <div class="product-display-row flex-row mt-3" id="product-display-row">
      <span class="pm-label" style="margin-bottom:0;flex-shrink:0;">แสดง:</span>
      <div class="pill-group" id="product-display-mode-group" role="group">
        <button type="button" class="pill active" data-value="product">สินค้า</button>
        <button type="button" class="pill" data-value="product_box">สินค้า+กล่อง</button>
        <button type="button" class="pill" data-value="box_only">กล่อง</button>
      </div>
    </div>

    <!-- Count & Arrangement -->
    <div id="product-arrangement-row" class="mt-3">
      <div class="pm-label" style="margin-bottom:4px;">Arrangement</div>
      <div class="flex-row" style="gap:6px;flex-wrap:wrap;">
        <div class="pill-group" id="product-count-group" role="group">
          <button type="button" class="pill active" data-val="1">1</button>
          <button type="button" class="pill" data-val="2">2</button>
          <button type="button" class="pill" data-val="3">3</button>
          <button type="button" class="pill" data-val="multiple">Multiple</button>
        </div>
        <div class="pill-group" id="product-arrangement-group" role="group">
          <button type="button" class="pill active" data-val="single hero">Single Hero</button>
          <button type="button" class="pill" data-val="symmetrical">Symmetrical</button>
          <button type="button" class="pill" data-val="stacked">Stacked</button>
          <button type="button" class="pill" data-val="scattered">Scattered</button>
          <button type="button" class="pill" data-val="floating">Floating</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Structure -->
  <div id="product-modal" class="pm-modal" role="dialog" aria-modal="true" aria-labelledby="product-modal-title">
    <div class="pm-modal-overlay" id="product-modal-overlay"></div>
    <div class="pm-modal-container">
      <div class="pm-modal-header">
        <div class="header-brand">
          <h3 class="workspace-title" id="product-modal-title" style="font-size: 20px;">เลือกสินค้า</h3>
        </div>
        <button type="button" class="theme-toggle-btn" id="close-product-modal" style="border:none; background:none;">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>

      <div class="pm-modal-body--with-sidebar">
        <div class="pm-modal-sidebar" id="product-category-sidebar"></div>
        <div class="pm-modal-main" id="product-modal-main">
          <div class="product-search-wrapper" style="margin-bottom:var(--sp-3);">
            <span class="material-symbols-outlined">search</span>
            <input type="text" class="product-search-input" id="modal-product-search" placeholder="ค้นหาสินค้า..." autocomplete="off" />
          </div>
          <div class="scent-tabs" id="product-tabs-container" role="tablist" aria-label="เลือกสินค้า"></div>
        </div>
      </div>
      <div class="pm-modal-footer" style="gap: 8px;">
        <button type="button" class="clear-btn" id="clear-product-selection">ล้างค่า</button>
        <button type="button" class="main-btn" id="confirm-product-selection">ปิด</button>
      </div>
    </div>
  </div>

  <input type="hidden" id="product-display-mode" value="product">
  <input type="hidden" id="f-display-mode">
  <input type="hidden" id="f-product-count" value="1">
  <input type="hidden" id="f-product-names">
</section>
