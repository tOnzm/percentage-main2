<section class="workspace-section">
  <div class="section-title">
    <i class="ti ti-droplet" aria-hidden="true"></i> สินค้า
  </div>

  <div class="section-content">
    <div>
      <div class="pm-label">เลือกสินค้า</div>
      <div class="scent-tabs" id="product-tabs-container" role="tablist" aria-label="เลือกสินค้า"></div>
    </div>

    <div>
      <div class="pm-label">ระบุเอง</div>
      <div style="display: flex; flex-direction: column; gap: 8px;">
        <input class="pm-input" id="product-custom-brand" placeholder="ระบุแบรนด์" autocomplete="off" />
        <input class="pm-input" id="product-custom-name" placeholder="ระบุชื่อสินค้า" autocomplete="off" />
        <input class="pm-input" id="product-custom-label" placeholder="ระบุข้อความบนฉลาก" autocomplete="off" />
      </div>
    </div>

    <div class="scent-detail" id="scent-detail" aria-live="polite">
      คลิกสินค้าเพื่อดูรายละเอียด
    </div>

    <div>
      <div class="pm-label">ตัวเลือกการแสดงผล</div>
      <div class="pill-group" id="product-display-mode-group" role="group" aria-label="เลือกรูปแบบการแสดงสินค้า">
        <button type="button" class="pill active" data-value="product">สินค้า</button>
        <button type="button" class="pill" data-value="product_box">สินค้า+กล่อง</button>
        <button type="button" class="pill" data-value="box_only">กล่อง</button>
      </div>
    </div>
  </div>

  <input type="hidden" id="product-display-mode" value="product">
  <input type="hidden" id="f-display-mode">
  <input type="hidden" id="f-product-count" value="1">
  <input type="hidden" id="f-product-names">
</section>
