<section class="workspace-section">
  <div class="section-title">
    <i class="ti ti-sparkles" aria-hidden="true"></i> Prompt Output
  </div>

  <div class="section-content">


    <div class="out-header" style="flex-direction: column; gap: 8px; margin-bottom: 12px;">
      <div class="out-title-block">
        <span class="out-tag"></span>
        <div class="out-scent" id="out-scent-name" aria-label="ชื่อสินค้า"></div>
      </div>
      <div style="display: flex; flex-direction: row; gap: 8px; width: 100%;">

        <button type="button" id="btn-copy-prompt" class="send-btn" onclick="copyAsPrompt()"
          style="flex: 1; justify-content: center; height: 38px;">
          <span class="material-symbols-outlined">content_paste</span> คัดลอกเฉพาะ Prompt
        </button>
        <button type="button" class="copy-btn" id="copy-btn" onclick="copyPrompt()"
          style="position: static; flex: 1; justify-content: center; height: 38px; font-size: 12px;">
          <span class="material-symbols-outlined">content_copy</span> คัดลอก JSON
        </button>

      </div>
    </div>

    <!-- Hidden state fields -->
    <div class="prompt-fields" aria-hidden="true">
      <input id="f-product" /><input id="f-placement" /><input id="f-props" />
      <input id="f-bg" /><input id="f-color" /><input id="f-mood" />
      <input id="f-light" /><input id="f-camera" /><input id="f-lens" /><input
        id="f-quality" /><input id="f-extra" /><input id="f-composition" /><input id="f-effects" /><input id="f-shadow" />
      <input id="f-theme" /><input id="f-lighting" /><input id="f-atmosphere" />
    </div>

    <div style="position: relative; flex: 1; display: flex;">
      <textarea class="out-compiled" id="out-compiled" readonly placeholder="" aria-label="JSON output"
        aria-readonly="true"></textarea>

    </div>

    <div class="char-count" id="char-count" aria-live="polite">0 ตัวอักษร</div>
  </div>
</section>
