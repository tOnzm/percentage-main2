<section class="workspace-section">
  <div class="section-title">
    <span class="material-symbols-outlined">image</span> พื้นหลัง
  </div>

  <div class="section-content">
    <button type="button" class="action-btn" id="open-background-modal" style="width: 100%;">
      <span class="material-symbols-outlined">add</span> เลือกพื้นหลัง
    </button>
    <div class="product-detail" id="background-detail" aria-live="polite">
      ยังไม่เลือกพื้นหลัง
    </div>
  </div>

  <!-- Modal Structure -->
  <div id="background-modal" class="pm-modal" role="dialog" aria-modal="true" aria-labelledby="background-modal-title">
    <div class="pm-modal-overlay" id="background-modal-overlay"></div>
    <div class="pm-modal-container">
      <div class="pm-modal-header">
        <div class="header-brand">
          <h3 class="workspace-title" id="background-modal-title" style="font-size: 20px;">จัดการพื้นหลัง</h3>
        </div>
        <button type="button" class="theme-toggle-btn" id="close-background-modal"
          style="border:none; background:none;">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>

      <div class="pm-modal-body pm-modal-body--with-sidebar">
        <aside class="pm-modal-sidebar">
          <div class="sidebar-toggle-container" style="display: flex; justify-content: flex-end; margin-bottom: 12px;">
            <button type="button" id="background-sidebar-toggle" class="theme-toggle-btn"
              style="width: 28px; height: 28px; font-size: 12px;">
              <span class="material-symbols-outlined">chevron_left</span>
            </button>
          </div>
          <div class="modal-sidebar-nav" style="display: flex; flex-direction: column; gap: 8px; width: 100%;">
            <button type="button" class="modal-nav-btn active" data-target="bg-solid-pane">
              <span class="material-symbols-outlined">palette</span> <span>Solid Color</span>
            </button>
            <button type="button" class="modal-nav-btn" data-target="bg-gradient-pane">
              <span class="material-symbols-outlined">gradient</span> <span>Gradient</span>
            </button>
            <button type="button" class="modal-nav-btn" data-target="bg-studio-pane">
              <span class="material-symbols-outlined">deployed_code</span> <span>Studio</span>
            </button>
            <button type="button" class="modal-nav-btn" data-target="bg-scene-pane">
              <span class="material-symbols-outlined">image</span> <span>Scene</span>
            </button>
            <button type="button" class="modal-nav-btn" data-target="bg-custom-pane">
              <span class="material-symbols-outlined">edit</span> <span>Custom</span>
            </button>
          </div>
        </aside>

        <div class="pm-modal-main">
          <div id="bg-solid-pane" class="modal-section">
            <div class="pm-label">เลือกสีพื้นหลัง</div>
            <div class="cgrid" id="solid-grid"></div>
            <div class="bg-hex-row mt-3">
              <div class="hex-preview-box" id="solid-hex-preview"></div>
              <input class="pm-input" id="solid-hex" placeholder="#HEX" maxlength="7" autocomplete="off" />
              <input class="pm-input" id="solid-custom" placeholder="หรือพิมพ์อธิบายเอง" autocomplete="off" />
            </div>
          </div>

          <div id="bg-gradient-pane" class="modal-section" style="display: none;">
            <div class="pm-label">เลือก Gradient</div>
            <div class="cgrid" id="grad-grid"></div>
            <div class="pm-label mt-4">ทิศทางการไล่เฉด</div>
            <div class="pill-group" id="grad-dir-group"></div>
          </div>

          <div id="bg-studio-pane" class="modal-section" style="display: none;">
            <div class="studio-grid">
              <div>
                <div class="pm-label">Backdrop Color</div>
                <div class="cgrid studio-color-grid" id="studio-bg-grid"></div>
                <div class="bg-hex-row mt-3">
                  <div class="hex-preview-box" id="studio-bg-hex-preview"></div>
                  <input class="pm-input" id="studio-bg-hex" placeholder="#HEX" maxlength="7" autocomplete="off"
                    style="width:80px; flex-shrink:0;" />
                  <input class="pm-input" id="studio-bg-custom" placeholder="ระบุสี" autocomplete="off" />
                </div>
              </div>
              <div>
                <div class="pm-label">Floor Color</div>
                <div class="cgrid studio-color-grid" id="studio-floor-grid"></div>
                <div class="bg-hex-row mt-3">
                  <div class="hex-preview-box" id="studio-floor-hex-preview"></div>
                  <input class="pm-input" id="studio-floor-hex" placeholder="#HEX" maxlength="7" autocomplete="off"
                    style="width:80px; flex-shrink:0;" />
                  <input class="pm-input" id="studio-floor-custom" placeholder="ระบุสี" autocomplete="off" />
                </div>
              </div>
            </div>
            <div class="studio-grid mt-4 pt-4" style="border-top:1px dashed var(--border);">
              <div>
                <div class="pm-label">Lighting</div>
                <div id="studio-light-group" class="pill-group"></div>
              </div>
              <div>
                <div class="pm-label">Shadow</div>
                <div id="studio-shadow-group" class="pill-group"></div>
              </div>
            </div>
          </div>

          <div id="bg-scene-pane" class="modal-section" style="display: none;">
            <div class="pm-label">เลือกฉากหลัง (Scene)</div>
            <div class="scene-grid" id="scene-grid"></div>
          </div>

          <div id="bg-custom-pane" class="modal-section" style="display: none;">
            <div class="pm-label">พิมพ์อธิบายฉากหลังเอง</div>
            <textarea class="pm-textarea" id="bg-custom-text" rows="3"
              placeholder="เช่น a luxurious living room with marble floors and large windows..."></textarea>
          </div>
        </div>

        <!-- Right Sidebar for Scene Customization - ย้ายมาไว้หลัง pm-modal-main -->
        <aside class="pm-modal-sidebar pm-modal-sidebar--right" id="background-scene-custom-sidebar">
          <div class="sidebar-toggle-container" style="display: flex; justify-content: flex-start; margin-bottom: 12px;">
            <button type="button" id="background-scene-custom-toggle" class="theme-toggle-btn"
              style="width: 28px; height: 28px; font-size: 12px;">
              <span class="material-symbols-outlined">chevron_right</span>
            </button>
          </div>
          <div class="pm-label">ปรับแต่ง Scene</div>
          <div class="pm-field mt-3">
              <div class="pm-label">โทนสีแท่นวาง (Platform Tone)</div>
              <input type="text" id="scene-platform-tone" class="pm-input" placeholder="เช่น Warm Cream, Matte Black" autocomplete="off" />
          </div>
          <div class="pm-field mt-3">
              <div class="pm-label">โทนสีพืชพรรณ (Plant Tone)</div>
              <input type="text" id="scene-plant-tone" class="pm-input" placeholder="เช่น Tropical Green, Autumn Red" autocomplete="off" />
          </div>
          <div class="pm-field mt-3">
              <div class="pm-label">โทนสีท้องฟ้า (Sky Tone)</div>
              <input type="text" id="scene-sky-tone" class="pm-input" placeholder="เช่น Pastel Pink, Deep Blue" autocomplete="off" />
          </div>
        </aside>
      </div>

      <div class="pm-modal-footer" style="gap: 8px;">
        <button type="button" class="clear-btn" id="clear-background-selection">ล้างค่า</button>
        <button type="button" class="main-btn" id="confirm-background-selection">ตกลง</button>
      </div>
    </div>
  </div>
</section>
