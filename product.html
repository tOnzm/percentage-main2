<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Catalog - PromptGen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/preview.css">
  <link rel="stylesheet" href="./css/productColorBtn.css">
</head>

<body>
  <!-- Top Header (No links) -->
  <header class="top-header">
    <div class="header-brand">
      <h1 class="workspace-title">%PromptGen</h1>
      <span class="workspace-subtitle">v0.3</span>
    </div>
    <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle theme">
      <span class="material-symbols-outlined">light_mode</span>
    </button>
  </header>

  <div class="workspace-layout">
    <!-- Sidebar Navbar -->
    <aside class="workspace-sidebar">
      <nav class="sidebar-nav">
        <a href="index.html" class="nav-link">
          <span class="material-symbols-outlined">home</span>
          <span>Home</span>
        </a>
        <a href="product.html" class="nav-link active">
          <span class="material-symbols-outlined">inventory_2</span>
          <span>Product</span>
        </a>
      </nav>
    </aside>

    <!-- Main Workspace Content -->
    <div class="workspace-main scrollable-content">
      <!-- Product Gallery Container -->
      <div class="product-gallery-container">
        <header class="gallery-header">
          <h2>คลังข้อมูลสินค้า (Product Catalog)</h2>
          <p>เลือกดูและจัดการรายการสินค้าในระบบเพื่อนำไปสร้าง Prompt</p>
        </header>

        <div class="product-grid" id="product-grid">
          <!-- Dynamic product cards will load here -->
        </div>
      </div>
    </div>

  <!-- Scripts -->
  <script src="./data/products.js"></script>
  <script>
    // Theme switching logic (Dark/Light mode)
    function initTheme() {
      const themeToggle = document.getElementById("theme-toggle");
      const currentTheme =
        localStorage.getItem("theme") ||
        (window.matchMedia("(prefers-color-scheme: dark)").matches
          ? "dark"
          : "light");

      const updateIcon = (isDark) => {
        if (!themeToggle) return;
        const icon = themeToggle.querySelector("span") || themeToggle.querySelector("i");
        if (icon) {
          icon.textContent = isDark ? "dark_mode" : "light_mode";
        }
      };

      if (currentTheme === "dark") {
        document.documentElement.setAttribute("data-theme", "dark");
        updateIcon(true);
      } else {
        updateIcon(false);
      }

      if (themeToggle) {
        themeToggle.addEventListener("click", () => {
          const isDark =
            document.documentElement.getAttribute("data-theme") === "dark";
          if (isDark) {
            document.documentElement.removeAttribute("data-theme");
            localStorage.setItem("theme", "light");
            updateIcon(false);
          } else {
            document.documentElement.setAttribute("data-theme", "dark");
            localStorage.setItem("theme", "dark");
            updateIcon(true);
          }
        });
      }
    }

    // Format label details elegantly
    function formatLabels(labelData) {
      if (!labelData) return '<div class="product-label-value">—</div>';
      if (Array.isArray(labelData)) {
        return labelData.map(l => `<div class="product-label-value">• ${l}</div>`).join('');
      }
      return `<div class="product-label-value">• ${labelData}</div>`;
    }

    // Render all product cards dynamically
    function renderProducts() {
      const grid = document.getElementById("product-grid");
      if (!grid) return;

      grid.innerHTML = "";

      Object.entries(products).forEach(([id, item]) => {
        const card = document.createElement("div");
        card.className = "product-card";

        // Stripe representing product primary color
        const stripeColor = item.color || "var(--border-dark)";
        const colorStripe = document.createElement("div");
        colorStripe.className = "product-card-color-stripe";
        colorStripe.style.backgroundColor = stripeColor;
        card.appendChild(colorStripe);

        // Header info (Brand & Category Tag)
        const cardHeader = document.createElement("div");
        cardHeader.className = "product-card-header";
        
        const brandSpan = document.createElement("span");
        brandSpan.className = "product-brand";
        brandSpan.textContent = item.brand || "Percentage";
        
        const catSpan = document.createElement("span");
        catSpan.className = "product-tag-cat";
        catSpan.textContent = item.category || "อื่นๆ";
        
        cardHeader.appendChild(brandSpan);
        cardHeader.appendChild(catSpan);
        card.appendChild(cardHeader);

        // Product Name
        const nameHeading = document.createElement("h3");
        nameHeading.className = "product-name";
        nameHeading.textContent = item.name;
        card.appendChild(nameHeading);

        // Description
        const descPara = document.createElement("p");
        descPara.className = "product-desc";
        descPara.textContent = item.desc || "ไม่มีข้อมูลรายละเอียดสินค้า";
        card.appendChild(descPara);

        // Label Info Box
        const labelBox = document.createElement("div");
        labelBox.className = "product-label-box";
        
        const labelTitle = document.createElement("div");
        labelTitle.className = "product-label-title";
        labelTitle.textContent = "ฉลากสินค้า (Labels)";
        
        labelBox.appendChild(labelTitle);
        labelBox.innerHTML += formatLabels(item.label);
        card.appendChild(labelBox);

        // Use Product CTA Button
        const selectBtn = document.createElement("button");
        selectBtn.type = "button";
        selectBtn.className = "use-product-btn";
        selectBtn.innerHTML = '<span class="material-symbols-outlined">auto_awesome</span> เลือกใช้สินค้านี้';
        selectBtn.addEventListener("click", () => {
          localStorage.setItem("selectedProductId", id);
          window.location.href = "index.html";
        });
        card.appendChild(selectBtn);

        grid.appendChild(card);
      });
    }

    // Initialize Page
    document.addEventListener("DOMContentLoaded", () => {
      initTheme();
      renderProducts();
    });
  </script>
</body>

</html>
