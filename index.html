<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromptGen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&family=Baskervville+SC&display=swap"
    rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/dashboard.css">
  <link rel="stylesheet" href="./css/preview.css">
  <link rel="stylesheet" href="./css/productColorBtn.css">
</head>

<body>
  <!-- Top Header -->
  <header class="top-header">
    <div class="header-left">
      <div class="header-brand">
        <h1 class="workspace-title">%PromptGen</h1>
        <span class="workspace-subtitle">v0.3</span>
      </div>
    </div>
    <div class="header-right">
      <button id="generate-btn" class="generate-btn">
        <span class="material-symbols-outlined">auto_awesome</span>
        Generate
      </button>
      <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle theme">
        <span class="material-symbols-outlined">light_mode</span>
      </button>
    </div>
  </header>

  <div class="workspace-layout">
    <div class="workspace-main">
      <div class="workspace-container">
        <!-- 3-COLUMN SaaS Layout -->
        <div class="ws-3col">
          <div class="ws-col ws-col-left">
            <div id="dashboard-placeholder"></div>
          </div>
          <div class="ws-col ws-col-center">
            <div id="dashboard-content" class="dashboard-content"></div>
          </div>
          <div class="ws-col ws-col-right">
            <div id="output-section-placeholder"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Status Bar -->
  <div class="workspace-status">
    <span class="status-dot"></span>
    <span>Ready</span>
    <span class="status-right">Nano Banana</span>
  </div>

  <script src="./data/products.js"></script>
  <script src="./data/baseColors_data.js"></script>
  <script src="./data/gradientColors_data.js"></script>
  <script src="./data/scene_data.js"></script>
  <script src="./data/placementData.js"></script>
  <script src="./data/ingredients_data.js"></script>
  <script src="./data/cameraAngles.js"></script>
  <script src="./data/lightingData.js"></script>
  <script src="./data/mood_tone.js"></script>
  <script src="./data/ratio_data.js"></script>
  <script src="./data/quality_data.js"></script>
  <script src="./data/lensData.js"></script>
  <script src="./data/cameraBodyData.js"></script>
  <script src="./data/compositionData.js"></script>
  <script src="./data/cameraEffectsData.js"></script>
  <script src="./data/shadowData.js"></script>
  <script src="./data/themeData.js"></script>
  <script src="./data/atmosphereData.js"></script>

  <!-- Core utilities -->
  <script src="./js/config.js"></script>
  <script src="./js/helpers.js"></script>
  <script src="./js/core.js"></script>

  <!-- Component logic -->
  <script src="./components/product-section/product-section.js"></script>
  <script src="./components/scene-section/placement-section.js"></script>
  <script src="./components/scene-section/props-section.js"></script>
  <script src="./components/background-section/background-section.js"></script>
  <script src="./components/camera-section/angleLens-section.js"></script>
  <script src="./components/scene-section/theme-section.js"></script>
  <script src="./components/scene-section/lighting-section.js"></script>
  <script src="./components/scene-section/atmosphere-section.js"></script>
  <script src="./components/scene-section/color-lock-section.js"></script>

  <!-- Dashboard -->
  <script src="./components/dashboard/dashboard.js"></script>

  <!-- Bootstrap -->
  <script src="./js/main.js"></script>
</body>

</html>
